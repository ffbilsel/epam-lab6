name: ci

on:
  push:
    branches: [main, '**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: auth
          POSTGRES_PASSWORD: auth
          POSTGRES_DB: auth
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U auth"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://auth:auth@localhost:5432/auth
      JWT_SECRET: test-secret-test-secret-test-secret-12
      SMTP_URL: smtp://localhost:1025
      EMAIL_FROM: no-reply@example.com
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format
      - run: npm run migrate:up
      - run: npm test
