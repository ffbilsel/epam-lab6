services:
  postgres:
    image: postgres:16
    container_name: auth-pg
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports: ['5432:5432']
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auth -d auth']
      interval: 3s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog
    container_name: auth-mail
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-app
    depends_on:
      postgres: { condition: service_healthy }
      mailhog: { condition: service_started }
    environment:
      PORT: '3000'
      DATABASE_URL: postgres://auth:auth@postgres:5432/auth
      JWT_SECRET: dev-secret-dev-secret-dev-secret-12
      JWT_EXPIRES_IN: '86400'
      BCRYPT_COST: '10'
      SMTP_URL: smtp://mailhog:1025
      EMAIL_FROM: no-reply@example.com
      RESET_TOKEN_TTL_SECONDS: '3600'
      VERIFY_TOKEN_TTL_SECONDS: '86400'
      LOCKOUT_THRESHOLD: '10'
      LOCKOUT_WINDOW_SECONDS: '600'
      LOCKOUT_DURATION_SECONDS: '900'
      LOG_LEVEL: 'info'
      NODE_ENV: 'development'
    ports: ['3000:3000']
    profiles: ['app'] # opt-in: docker compose --profile app up

volumes:
  pgdata:
